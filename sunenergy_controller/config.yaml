name: SunEnergy XT Controller
version: "2.1.6"
slug: sunenergy_controller
description: >
  Zero-feed-in controller for SunEnergyXT 500 Pro with Hoymiles HMS
  inverter throttling via OpenDTU. Universal GS-based regulation
  using Shelly Pro 3EM as grid meter.
url: https://github.com/nemex/sunenergy-ha-addon
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
startup: application
boot: auto
homeassistant_api: true
hassio_api: true
host_network: false
# v1.9.2: Web UI direkt in der HA-Sidebar (auch remote via Nabu Casa, ohne Port-Freigabe)
ingress: true
ingress_port: 8765
panel_icon: mdi:solar-power-variant
panel_title: SunEnergy XT
# v1.9.2: Supervisor startet das Add-on neu, wenn die Web UI nicht mehr antwortet
watchdog: "http://[HOST]:[PORT:8765]/state"
ports:
  8765/tcp: 8765
ports_description:
  8765/tcp: Web UI (direkter Zugriff, optional — Ingress ist aktiv)
options:
  shelly_ip: "192.168.178.98"
  sunenergy_ip: "192.168.178.94"
  ha_ip: "192.168.178.132"
  hms_2000_entity: "number.hoymiles_hms_2000_4t_limit_nonpersistent_absolute"
  hms_1600_entity: "number.hoymiles_hms_1600_4t_limit_nonpersistent_absolute"
  grid_sensor: "sensor.shellypro3em_leistung"
  soc_sensor: "sensor.sunenergyxt_500_pro_system_speicherlevel"
  gs_entity: "number.sunenergyxt_500_pro_sollwert_leistung_netzanschluss"
  mm_switch: "switch.sunenergyxt_500_pro_lokaler_nulleinspeisemodus"
  sa_entity: "number.sunenergyxt_500_pro_system_ladegrenze"
  haus_power_sensor: "sensor.hausverbrauch_aktuell"
  hms_2000_power_sensor: "sensor.hoymiles_hms_2000_4t_power"
  hms_1600_power_sensor: "sensor.hoymiles_hms_1600_4t_power"
  hms_2000_reachable_sensor: "binary_sensor.hoymiles_hms_2000_4t_reachable"
  hms_1600_reachable_sensor: "binary_sensor.hoymiles_hms_1600_4t_reachable"
  soc_normal_max: 95
  soc_min: 10
  calibration_days: 15
  dry_run: false
  manual_feed_in_switch: "input_boolean.sunenergy_manual_feed_in"
  manual_feed_in_target: 1.0
  manual_feed_in_min_soc: 90
  manual_feed_in_power: 3600
  bypass_tomorrow_switch: "input_boolean.sunenergy_bypass_tomorrow"
  # L2 Speicher (optional)
  sunenergy_ip_l2: "192.168.178.122"
  soc_sensor_l2: "sensor.sunenergyxt_500_pro_l2_system_speicherlevel"
  gs_entity_l2: "number.sunenergyxt_500_pro_l2_sollwert_leistung_netzanschluss"
  mm_switch_l2: "switch.sunenergyxt_500_pro_l2_lokaler_nulleinspeisemodus"
  sa_entity_l2: "number.sunenergyxt_500_pro_l2_system_ladegrenze"
  use_native_pid: false
  proxy_split_mode: "soc"
schema:
  shelly_ip: str
  sunenergy_ip: str
  ha_ip: str
  hms_2000_entity: str
  hms_1600_entity: str
  grid_sensor: str
  soc_sensor: str
  gs_entity: str
  mm_switch: str
  sa_entity: str
  haus_power_sensor: str
  hms_2000_power_sensor: str
  hms_1600_power_sensor: str
  hms_2000_reachable_sensor: str
  hms_1600_reachable_sensor: str
  soc_normal_max: int
  soc_min: int
  calibration_days: int
  dry_run: bool
  manual_feed_in_switch: str
  manual_feed_in_target: float
  manual_feed_in_min_soc: float
  manual_feed_in_power: int
  bypass_tomorrow_switch: str
  # L2 Speicher Schema (optional, erlaubt leere Strings)
  sunenergy_ip_l2: str?
  soc_sensor_l2: str?
  gs_entity_l2: str?
  mm_switch_l2: str?
  sa_entity_l2: str?
  use_native_pid: bool
  proxy_split_mode: str

