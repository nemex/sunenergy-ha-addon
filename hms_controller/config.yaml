name: "HMS Zero Feed-in Controller"
version: "1.0.3"
slug: "hms_controller"
description: "Schlanker Nulleinspeisungs-Regler für zwei Hoymiles HMS Wechselrichter, abgestimmt mit der offiziellen SunEnergy App (AC-Kopplung)."
url: "https://github.com/nemex/sunenergy-ha-addon"
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
startup: application
boot: auto
homeassistant_api: true
hassio_api: true
ingress: true
ingress_port: 8765
panel_icon: mdi:solar-power
panel_title: HMS Controller
options:
  shelly_ip: "192.168.178.98"
  ha_ip: "192.168.178.132"
  hms_2000_entity: "number.hoymiles_hms_2000_4t_limit_nonpersistent_absolute"
  hms_1600_entity: "number.hoymiles_hms_1600_4t_limit_nonpersistent_absolute"
  grid_sensor: "sensor.shellypro3em_leistung"
  hms_2000_power_sensor: "sensor.hoymiles_hms_2000_4t_power"
  hms_1600_power_sensor: "sensor.hoymiles_hms_1600_4t_power"
  soc_sensor: "sensor.sunenergyxt_500_pro_system_speicherlevel"
  soc_sensor_l2: "sensor.sunenergyxt_500_pro_l2_system_speicherlevel"
  sunenergy_ip: "192.168.178.94"
  sunenergy_ip_l2: "192.168.178.122"
  damping: 0.5
  hms_min: 300
  hms_max: 3600
  tick_interval: 5
schema:
  shelly_ip: str
  ha_ip: str
  hms_2000_entity: str
  hms_1600_entity: str
  grid_sensor: str
  hms_2000_power_sensor: str
  hms_1600_power_sensor: str
  soc_sensor: str?
  soc_sensor_l2: str?
  sunenergy_ip: str?
  sunenergy_ip_l2: str?
  damping: float
  hms_min: int
  hms_max: int
  tick_interval: int
